<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>محمد عباس | وسيط تأجير الشقق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- خلفية متدرجة مع كرات ضبابية -->
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <!-- شاشة البداية -->
  <div id="splash" class="splash">
    <div class="splash-logo glass">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/><path d="M9 21v-6h6v6"/></svg>
    </div>
    <h1 class="splash-title">محمد عباس</h1>
    <p class="splash-sub">وسيط تأجير الشقق السكنية</p>
    <div class="splash-loader"><span></span></div>
  </div>

  <!-- حاوية التطبيق -->
  <div id="app" class="app hidden">
    <!-- الرأس -->
    <header id="topbar" class="topbar glass"></header>

    <!-- محتوى الشاشات -->
    <main id="screen" class="screen"></main>

    <!-- شريط التنقل السفلي -->
    <nav id="bottomnav" class="bottomnav glass"></nav>
  </div>

  <!-- نافذة منبثقة عامة -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal glass" id="modalBox"></div>
  </div>

  <!-- تنبيهات منبثقة (Toast) -->
  <div id="toast" class="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
